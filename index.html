<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#071326">
  <meta name="description" content="A peaceful infinite campfire beneath a star-filled sky.">
  <title>Infinite Campfire</title>
  <style>
    :root{color-scheme:dark}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#071326}body{font-family:ui-rounded,"Avenir Next",Avenir,system-ui,sans-serif}.app{position:fixed;inset:0;background:#071326;isolation:isolate}canvas{display:block;width:100%;height:100%}.title{position:fixed;top:clamp(22px,4vh,42px);left:50%;transform:translateX(-50%);text-align:center;color:rgba(225,235,238,.72);user-select:none;pointer-events:none;text-shadow:0 1px 18px rgba(0,0,0,.8);animation:arrive 1.8s ease both}.title p{margin:0;font-size:11px;font-weight:600;letter-spacing:.35em;white-space:nowrap}.title span{display:block;margin-top:7px;font:italic 14px/1.3 Georgia,serif;letter-spacing:.04em;color:rgba(201,216,220,.45)}.pause{position:fixed;right:22px;bottom:22px;width:42px;height:42px;border-radius:50%;border:1px solid rgba(218,230,231,.15);background:rgba(5,12,16,.24);color:rgba(225,235,235,.56);display:flex;align-items:center;justify-content:center;gap:4px;cursor:pointer;backdrop-filter:blur(8px);transition:.3s}.pause:hover{background:rgba(17,29,35,.58);border-color:rgba(227,235,235,.3);transform:scale(1.05)}.pause:focus-visible{outline:2px solid rgba(255,180,96,.7);outline-offset:3px}.bar{width:3px;height:12px;border-radius:2px;background:currentColor}.play{width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:9px solid currentColor;margin-left:2px}@keyframes arrive{from{opacity:0;transform:translate(-50%,-8px)}to{opacity:1;transform:translate(-50%,0)}}@media(prefers-reduced-motion:reduce){.title{animation:none}}@media(max-height:520px){.title span{display:none}}
  </style>
</head>
<body>
  <main class="app">
    <canvas id="scene" aria-label="An animated campfire glowing in a peaceful nighttime pine forest"></canvas>
    <div class="title"><p>INFINITE CAMPFIRE</p><span>stay as long as you like</span></div>
    <button class="pause" id="pause" aria-label="Pause the campfire"><i class="bar"></i><i class="bar"></i></button>
  </main>
  <script>
  (()=>{
    const canvas=document.querySelector('#scene'),ctx=canvas.getContext('2d'),button=document.querySelector('#pause');
    let width=0,height=0,dpr=1,last=performance.now(),time=0,paused=false,stars=[],particles=[];
    const rand=(a=0,b=1)=>a+Math.random()*(b-a), clamp=(n,a=0,b=1)=>Math.max(a,Math.min(b,n));
    function resize(){dpr=Math.min(devicePixelRatio||1,2);width=innerWidth;height=innerHeight;canvas.width=width*dpr;canvas.height=height*dpr;canvas.style.width=width+'px';canvas.style.height=height+'px';ctx.setTransform(dpr,0,0,dpr,0,0);stars=Array.from({length:Math.floor(width*height/7200)},()=>({x:Math.random(),y:rand(.025,.59),r:rand(.35,1.45),phase:rand(0,Math.PI*2),speed:rand(.22,.75)}))}
    function pine(x,base,h,shade,sway=0){ctx.save();ctx.translate(x+sway,base);ctx.fillStyle=shade;ctx.fillRect(-h*.018,-h*.72,h*.036,h*.72);for(let i=0;i<7;i++){const y=-h+i*h*.12,half=h*(.12+i*.042);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(-half,y+h*.32);ctx.quadraticCurveTo(0,y+h*.27,half,y+h*.32);ctx.closePath();ctx.fill()}ctx.restore()}
    function forest(base,scale,color,offset,sway){const gap=74*scale;for(let x=-gap;x<width+gap;x+=gap){const seed=Math.sin((x+offset)*9.731)*43758.5,f=seed-Math.floor(seed);pine(x+(f-.5)*31,base,(150+f*150)*scale,color,Math.sin(time*.12+x*.008)*sway)}}
    function flame(cx,ground,scale,color,alpha,lean){const h=145*scale,w=68*scale;ctx.save();ctx.translate(cx,ground);ctx.globalAlpha=alpha;ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=12*scale;ctx.beginPath();ctx.moveTo(-w*.48,0);ctx.bezierCurveTo(-w*.7,-h*.28,-w*.18,-h*.46,-w*.24+lean,-h*.7);ctx.bezierCurveTo(-w*.2+lean,-h*.88,w*.12+lean,-h*.96,w*.04+lean,-h);ctx.bezierCurveTo(w*.42+lean,-h*.72,w*.2,-h*.47,w*.55,-h*.27);ctx.bezierCurveTo(w*.72,-h*.09,w*.45,0,0,0);ctx.closePath();ctx.fill();ctx.restore()}
    function draw(now){const dt=Math.min((now-last)/1000,.04);last=now;if(!paused)time+=dt;const cx=width/2,ground=height*.79;
      let g=ctx.createLinearGradient(0,0,0,height);g.addColorStop(0,'#071326');g.addColorStop(.52,'#10223a');g.addColorStop(1,'#171c27');ctx.fillStyle=g;ctx.fillRect(0,0,width,height);
      g=ctx.createRadialGradient(width*.76,height*.14,0,width*.76,height*.14,height*.38);g.addColorStop(0,'rgba(91,125,151,.08)');g.addColorStop(1,'rgba(7,19,38,0)');ctx.fillStyle=g;ctx.fillRect(0,0,width,height*.65);
      for(const s of stars){const a=.25+.55*(.5+.5*Math.sin(time*s.speed+s.phase));ctx.fillStyle=`rgba(214,228,232,${a})`;ctx.beginPath();ctx.arc(s.x*width,s.y*height,s.r,0,Math.PI*2);ctx.fill()}
      forest(height*.68,.78,'#0b1a25',101,.35);forest(height*.755,1.03,'#08151c',37,.55);
      g=ctx.createLinearGradient(0,height*.66,0,height);g.addColorStop(0,'#091217');g.addColorStop(1,'#05090b');ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,height*.74);for(let x=0;x<=width;x+=45)ctx.lineTo(x,height*.76+Math.sin(x*.019)*9);ctx.lineTo(width,height);ctx.lineTo(0,height);ctx.fill();
      const scale=clamp(Math.min(width/900,height/700),.72,1.18);g=ctx.createRadialGradient(cx,ground-20,0,cx,ground-12,220*scale);g.addColorStop(0,'rgba(255,132,39,.27)');g.addColorStop(.45,'rgba(238,91,20,.08)');g.addColorStop(1,'rgba(238,75,10,0)');ctx.fillStyle=g;ctx.fillRect(cx-260,ground-270,520,330);
      if(!paused){if(Math.random()<dt*6.5)particles.push({x:cx+rand(-28,28)*scale,y:ground-78*scale,vx:rand(-10,10),vy:rand(-65,-32),life:0,max:rand(1.3,2.4),size:rand(1.2,3),phase:rand(0,6.28),kind:'ember'});if(Math.random()<dt*3.1)particles.push({x:cx+rand(-16,16),y:ground-145*scale,vx:rand(-7,7),vy:rand(-20,-9),life:0,max:rand(3,5.5),size:rand(14,27)*scale,phase:rand(0,6.28),kind:'smoke'});particles.forEach(p=>{p.life+=dt;p.x+=(p.vx+Math.sin(time*.7+p.phase)*5)*dt;p.y+=p.vy*dt;if(p.kind==='smoke')p.size+=dt*4});particles=particles.filter(p=>p.life<p.max)}
      particles.filter(p=>p.kind==='smoke').forEach(p=>{const a=Math.sin(Math.PI*p.life/p.max)*.075;ctx.fillStyle=`rgba(138,153,157,${a})`;ctx.beginPath();ctx.ellipse(p.x,p.y,p.size*.72,p.size,0,0,6.28);ctx.fill()});
      ctx.save();ctx.translate(cx,ground+6);ctx.lineCap='round';[[-.34,'#4b2719'],[.34,'#3a2119']].forEach(([r,c])=>{ctx.save();ctx.rotate(r);ctx.strokeStyle=c;ctx.lineWidth=21*scale;ctx.beginPath();ctx.moveTo(-66*scale,0);ctx.lineTo(66*scale,0);ctx.stroke();ctx.restore()});ctx.restore();
      const flicker=Math.sin(time*4.2)*.06+Math.sin(time*7.1+1)*.035,lean=(Math.sin(time*2.7)+Math.sin(time*1.1+2))*7*scale;flame(cx,ground,scale*(1+flicker),'#e84a1b',.78,lean);flame(cx-4,ground,scale*(.73+flicker*.6),'#ff8a25',.92,lean*.68);flame(cx+2,ground,scale*(.43+flicker*.35),'#ffd269',.96,lean*.25);
      particles.filter(p=>p.kind==='ember').forEach(p=>{const a=clamp(1-p.life/p.max);ctx.fillStyle=`rgba(255,${150+Math.floor(a*80)},65,${a})`;ctx.shadowColor='#ff7a25';ctx.shadowBlur=7;ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,6.28);ctx.fill();ctx.shadowBlur=0});pine(-20,height+40,height*.5,'#03080a');pine(width+10,height+35,height*.55,'#03080a');requestAnimationFrame(draw)}
    button.addEventListener('click',()=>{paused=!paused;button.setAttribute('aria-label',paused?'Resume the campfire':'Pause the campfire');button.innerHTML=paused?'<i class="play"></i>':'<i class="bar"></i><i class="bar"></i>'});
    addEventListener('resize',resize);resize();requestAnimationFrame(draw);
  })();
  </script>
</body>
</html>
